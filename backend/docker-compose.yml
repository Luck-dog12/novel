services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      COZE_API_BASE_URL: ${COZE_API_BASE_URL:-http://127.0.0.1:5000}
      COZE_API_RUN_PATH: ${COZE_API_RUN_PATH:-/run}
      COZE_API_STREAM_PATH: ${COZE_API_STREAM_PATH:-/stream_run}
      COZE_FORCE_SYNC_FOR_STREAM: ${COZE_FORCE_SYNC_FOR_STREAM:-true}
      COZE_STREAM_FALLBACK_TO_RUN: ${COZE_STREAM_FALLBACK_TO_RUN:-true}
      ENABLE_MOCK_FALLBACK: ${ENABLE_MOCK_FALLBACK:-false}
      COZE_CONNECT_TIMEOUT_MS: ${COZE_CONNECT_TIMEOUT_MS:-15000}
      COZE_REQUEST_TIMEOUT_MS: ${COZE_REQUEST_TIMEOUT_MS:-300000}
      COZE_SOCKET_TIMEOUT_MS: ${COZE_SOCKET_TIMEOUT_MS:-300000}
      STREAM_HEARTBEAT_INTERVAL_MS: ${STREAM_HEARTBEAT_INTERVAL_MS:-10000}
      COZE_API_TOKEN: ${COZE_API_TOKEN:-}
      COZE_API_KEY: ${COZE_API_KEY:-}
      COZE_API_URL: ${COZE_API_URL:-}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      REQUIRE_DB: ${REQUIRE_DB:-true}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

volumes:
  uploads:
